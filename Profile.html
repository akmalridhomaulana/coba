<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Akmal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: 
        linear-gradient(135deg, #000000 0%, #1a0000 50%, #000000 100%);
        background-size: 90% 90%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        padding: 20px;
        animation: gradientBG 6s ease infinite;
    }

    @keyframes gradientBG {
        0% {
            background-position: 0% 0%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 0%;
        }
    }

    .profile-container {
        width: 700%;
        max-width: 900px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 0, 0, 0.3);
        border-radius: 20px;
        padding: 30px;
        backdrop-filter: blur(10px);
        text-align: center;
        position: relative;
        animation: fadeIn 1s ease-out;
    }

    /* Animasi Muncul */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
        position: absolute;
        top: 15px;
        left: 20px;
        color: #ff3131;
        text-decoration: none;
        font-size: 0.9rem;
        transition: 0.3s;
    }

    .back-btn:hover {
        color: white; 
    }

    /* Foto */
    .profile-header {
        display: flex;
        align-items: start;
        justify-content: start;
        gap: 20px;
        margin-top: 15px;
        margin-bottom: 20px;
        cursor: pointer;
    }

    .avatar-wrapper {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        padding: 5px;
        background: linear-gradient(45deg, #ff3131, #8b0000);
        box-shadow: 0 0 15px rgba(255, 49, 49, 0.5);
    }

    .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #000;
    }

    .name-tag h1 {
        margin-top: 35px;
        font-size: 3rem;
        letter-spacing: 1px;
    }

    .name-tag p {
        margin-top: 5px;
        text-align: left;
        font-size: 2rem;
        color: #ff3131;
        font-weight: bold;
    }

    /* skil di  plajari */
    .skills-container {
        display: flex;
        justify-content: center;
        gap: 100px;
        margin-top: 25px;
        margin-bottom: 25px;
    }

    .skill-badge {
        width: 150px;
        height: 50px;
        background: #ff3131;
        color: white;
        padding: 20px 20px;
        border-radius: 5px;
        font-size: 1rem;
        box-shadow: 0 4px 10px rgba(255, 49, 49, 0.3);
        transition: 0.3s;
    }

    .skill-badge:hover {
        transform: scale(1.1);
        background: white;
        color: #ff3131;
    }

    /* deskripsi singkat */
    .about-card {
        background: rgba(255, 0, 0, 0.1);
        border: 1px dashed #ff3131;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 25px;
        line-height: 1.6;
        font-size: 0.95rem;
    }

    /* sosial media */
    .social-footer {
        display: flex;
        justify-content: center;
        gap: 70px;
    }

    .social-icon {
        font-size: 3rem;
        color: white;
        transition: 0.3s;
    }

    .social-icon:hover {
        color: #ff3131;
        transform: translateY(-5px);
    }

    /* Full Screen */
    .modal {
        display: none;
        position: fixed;
        z-index: 999;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        max-width: 80%;
        max-height: 80%;
        border-radius: 10px;
        border: 3px solid #ff3131;
        box-shadow: 0 0 30px rgba(255, 49, 49, 0.5);
        animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
        from { transform: scale(0); }
        to { transform: scale(1); }
    }

    /* keluar */
    .close-btn {
        position: absolute;
        top: 30px;
        right: 50px;
        color: white;
        font-size: 50px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    /* Animasi keluar */
    @keyframes zoomOut {
        from { transform: scale(1); opacity: 1; }
        to { transform: scale(0); opacity: 0; }
    }

    .keluar {
        animation: zoomOut 0.3s ease forwards;
    }

    .close-btn:hover { color: #ff3131; }

    /* --- reponship hp*/
@media (max-width: 600px) {
    .profile-container {
        width: 95%;
        padding: 20px 15px;
    }

    .profile-header {
        flex-direction: column; 
        align-items: center;
        text-align: center;
        gap: 10px;
    }

    .avatar-wrapper {
        width: 150px;
        height: 150px;
    }

    .name-tag h1 {
        font-size: 1.8rem;
        margin-top: 10px;
    }

    .name-tag p {
        font-size: 1.2rem;
        text-align: center;
    }

    .skills-container {
        gap: 10px;
        flex-wrap: wrap;
    }

    .skill-badge {
        width: calc(33% - 10px);
        padding: 10px 5px;
        font-size: 0.8rem;
        height: auto;
    }

    
    .social-footer {
        gap: 30px;
    }

    .social-icon {
        font-size: 2rem;
    }


    .close-btn {
        right: 20px;
        top: 20px;
        font-size: 40px;
    }
}
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>

        <header class="profile-header">
            <div class="avatar-wrapper">
                <img src="Gambar/foto.jpg" alt="Foto Profil" class="profile-img">
            </div>
            <div class="name-tag">
                <h1>AKMAL RIDHO MAULANA</h1>
                <p>SMK NEGERI 1 KANDEMAN</p>
            </div>
        </header>

        <div class="skills-container">
            <div class="skill-badge">HTML</div>
            <div class="skill-badge">CSS</div>
            <div class="skill-badge">JS</div>
            <div class="skill-badge">C#</div>
        </div>

        <div class="about-card">
            <p>Halo semuannya saya Akmal Ridho Maulana saya Seorang Siswa SMK Negeri 1 Kademan Aplilikasi ini saya buat sebagai tugas projek akhir
                Semester 2 ini dan semoga aplikasi yang saya buat ini dapat membantu ya
            </p>
        </div>

        <div class="social-footer">
            <a href="https://www.instagram.com/akmal.ridho.maulana?igsh=M2k1bDV2NXBzdDRi" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@fypaabangku?is_from_webapp=1&sender_device=pc" class="social-icon"><i class="fab fa-tiktok"></i></a>
            <a href="https://youtube.com/@sepulangkerja?si=ZnErFRgayortJXPc" class="social-icon"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <script>
    // 1. Ambil elemen-elemen yang dibutuhkan
    const modal = document.getElementById("imageModal");
    const img = document.querySelector(".profile-img");
    const modalImg = document.getElementById("fullImage");
    const closeBtn = document.querySelector(".close-btn");

    // 2. Fungsi saat foto profil diklik
    img.onclick = function() {
        modal.style.display = "flex"; // Munculkan modal
        modalImg.src = this.src; // Ambil gambar
    }

    // 3. tombol menutup
    closeBtn.onclick = function() {
        modal.style.display = "none";
    }

    // 4. Klik di mana saja di area gelap untuk menutup
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }

    // efek Zoom Out
    function tutupModal() {
        // 1. class animasi keluar ke gambar
        modalImg.classList.add("keluar");

        // 2. 0.3 detik hapus dari layar
        setTimeout(function() {
            modal.style.display = "none";
            // 3. Hapus class
            modalImg.classList.remove("keluar");
        }, 300); 
    }

    // tutup tombol X
    closeBtn.onclick = tutupModal;

    // tutup ke area gelap
    window.onclick = function(event) {
        if (event.target == modal) {
            tutupModal();
        }
    }
    </script>

</body>
</html>
