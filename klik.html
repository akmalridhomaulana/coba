<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gem Klik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
    * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #2c0000 0%, #000000 100%);
            height: 100vh;
            overflow: hidden; 
            color: white;
            position: relative;
            touch-action: manipulation; /* Biar di HP gak nge-zoom pas di klik cepet */
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff3131;
            text-decoration: none;
            z-index: 100;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .back-btn:hover { color: white; }

        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            opacity: 0.4;
            width: 90%;
        }

        .instruction h2 { font-size: clamp(1.5rem, 5vw, 3rem); }

        #click-area {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .spawn-icon {
            position: absolute;
            font-size: clamp(30px, 8vw, 50px);
            color: #ff3131;
            pointer-events: none;
            user-select: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8));
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .fade-out {
            animation: fadeAway 1s ease forwards;
        }

        @keyframes fadeAway {
            to { transform: scale(0.2) translateY(-20px); opacity: 0; }
        }
    </style>
</head>
<body>
    <a href="menu.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali</a>

    <div class="instruction">
        <h2>Klik di mana saja!</h2>
        <p>Ikon akan muncul dan menghilang dalam 5 detik.</p>
    </div>

    <div id="click-area"></div>
    <script>
        const clickArea = document.getElementById('click-area');
        const icons = ['fa-fire', 'fa-gem', 'fa-bolt', 'fa-star']; // ikon

        clickArea.addEventListener('click', (e) => {
            const icon = document.createElement('i');
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            icon.classList.add('fas', randomIcon, 'spawn-icon');

            // posisi agar pas di tengah kursor dan ukuran ikon
            const x = e.clientX - 20;
            const y = e.clientY - 20;
            
            icon.style.left = x + 'px';
            icon.style.top = y + 'px';

            clickArea.appendChild(icon);

            // Menghilang setelah 5 detik
            setTimeout(() => {
                icon.classList.add('fade-out');
                setTimeout(() => {
                    icon.remove();
                }, 1000);
            }, 5000);
        });
    </script>
</body>
</html>
